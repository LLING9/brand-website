<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>QR Code</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }
    h2 { margin-bottom: 16px; color: #333; }
    #qrcode { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    p { margin-top: 16px; color: #555; font-size: 14px; word-break: break-all; text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <h2>웹사이트 QR코드</h2>
  <div id="qrcode"></div>
  <p>https://brand-website-sooty.vercel.app/</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://brand-website-sooty.vercel.app/",
      width: 256,
      height: 256,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
